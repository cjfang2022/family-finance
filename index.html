<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家庭收支小管家</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @media print {
            .no-print { display: none !important; }
            body { background: #fff !important; }
        }
        .sync-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-700 min-h-screen">

    <!-- 頂欄 -->
    <header class="bg-gradient-to-r from-indigo-600 to-purple-600 text-white shadow-lg sticky top-0 z-40">
        <div class="max-w-5xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <span class="text-2xl">💳</span>
                <div>
                    <h1 class="font-bold text-lg tracking-wider">家庭收支小管家</h1>
                    <p class="text-xs text-indigo-100">記帳 × 預算 × 雲端備份</p>
                </div>
            </div>
            <div class="flex items-center space-x-1.5 text-xs">
                <span id="date-badge" class="bg-indigo-800/60 px-2 py-1.5 rounded-full font-semibold hidden md:inline">載入中...</span>

                <!-- 雲端同步狀態 -->
                <button id="gdrive-btn" onclick="toggleGDrive()" class="bg-white/20 hover:bg-white/30 px-2.5 py-1.5 rounded-lg transition flex items-center space-x-1" title="Google Drive 雲端同步">
                    <span id="gdrive-icon">☁️</span>
                    <span id="gdrive-label" class="hidden sm:inline">登入</span>
                </button>

                <!-- 備份選單 -->
                <div class="relative" id="backup-menu">
                    <button onclick="toggleBackupMenu()" class="bg-white/20 hover:bg-white/30 px-2.5 py-1.5 rounded-lg transition">💾</button>
                    <div id="backup-dropdown" class="absolute right-0 top-full mt-1 bg-white text-slate-700 rounded-xl shadow-xl border border-slate-100 w-44 hidden z-50 overflow-hidden">
                        <button onclick="exportJSON()" class="w-full text-left px-4 py-2.5 hover:bg-slate-50 text-xs font-medium flex items-center space-x-2"><span>📥</span><span>匯出備份檔</span></button>
                        <button onclick="document.getElementById('import-file').click()" class="w-full text-left px-4 py-2.5 hover:bg-slate-50 text-xs font-medium flex items-center space-x-2"><span>📤</span><span>匯入備份檔</span></button>
                        <hr class="border-slate-100">
                        <button onclick="resetAll()" class="w-full text-left px-4 py-2.5 hover:bg-rose-50 text-rose-500 text-xs font-medium flex items-center space-x-2"><span>🗑️</span><span>清空所有資料</span></button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <input type="file" id="import-file" accept=".json" class="hidden" onchange="importJSON(event)">

    <div class="max-w-5xl mx-auto px-4 py-6 space-y-6">

        <!-- 雲端同步狀態條 -->
        <div id="sync-status" class="hidden bg-white rounded-xl px-4 py-2.5 shadow-sm border border-slate-100 flex items-center justify-between text-xs">
            <div class="flex items-center space-x-2">
                <span id="sync-icon">☁️</span>
                <span id="sync-text" class="text-slate-500">未同步</span>
            </div>
            <div class="flex space-x-2">
                <button onclick="saveToDrive()" id="btn-sync-up" class="px-3 py-1.5 bg-indigo-100 text-indigo-700 hover:bg-indigo-200 rounded-lg font-medium transition">⬆️ 上傳</button>
                <button onclick="loadFromDrive()" id="btn-sync-down" class="px-3 py-1.5 bg-slate-100 text-slate-600 hover:bg-slate-200 rounded-lg font-medium transition">⬇️ 下載</button>
            </div>
        </div>

        <!-- 快速摘要 -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
            <div class="bg-white rounded-2xl p-4 shadow-sm border border-slate-100">
                <p class="text-xs text-slate-400">本月收入</p>
                <p id="sum-income" class="text-xl font-black text-emerald-600 mt-1">$0</p>
            </div>
            <div class="bg-white rounded-2xl p-4 shadow-sm border border-slate-100">
                <p class="text-xs text-slate-400">本月支出</p>
                <p id="sum-expense" class="text-xl font-black text-rose-500 mt-1">$0</p>
            </div>
            <div class="bg-white rounded-2xl p-4 shadow-sm border border-slate-100">
                <p class="text-xs text-slate-400">本月結餘</p>
                <p id="sum-balance" class="text-xl font-black text-indigo-600 mt-1">$0</p>
            </div>
            <div class="bg-white rounded-2xl p-4 shadow-sm border border-slate-100">
                <p class="text-xs text-slate-400">筆數</p>
                <p id="sum-count" class="text-xl font-black text-slate-600 mt-1">0</p>
            </div>
        </div>

        <!-- 主要操作區：兩欄 -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

            <!-- 左：新增紀錄 -->
            <div class="lg:col-span-1 bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
                <h2 class="font-bold text-sm text-slate-600 mb-4 flex items-center space-x-2">
                    <span class="w-6 h-6 bg-indigo-100 text-indigo-600 rounded-lg flex items-center justify-center text-xs font-black">+</span>
                    <span>新增記帳</span>
                </h2>
                <div class="space-y-3">
                    <div>
                        <label class="text-xs text-slate-400 font-medium">類別</label>
                        <div class="flex space-x-2 mt-1">
                            <button id="type-income" onclick="setType('income')" class="flex-1 py-2 rounded-xl text-xs font-bold transition bg-emerald-100 text-emerald-700 border border-emerald-200">💵 收入</button>
                            <button id="type-expense" onclick="setType('expense')" class="flex-1 py-2 rounded-xl text-xs font-bold transition bg-slate-100 text-slate-500 border border-slate-200">💸 支出</button>
                        </div>
                    </div>
                    <div>
                        <label class="text-xs text-slate-400 font-medium">日期</label>
                        <input type="date" id="tx-date" class="w-full mt-1 px-3 py-2 rounded-xl border border-slate-200 text-sm focus:ring-2 focus:ring-indigo-300 focus:border-indigo-400 outline-none">
                    </div>
                    <div>
                        <label class="text-xs text-slate-400 font-medium">分類</label>
                        <select id="tx-category" class="w-full mt-1 px-3 py-2.5 rounded-xl border border-slate-200 text-sm focus:ring-2 focus:ring-indigo-300 outline-none bg-white"></select>
                    </div>
                    <div>
                        <label class="text-xs text-slate-400 font-medium">金額</label>
                        <input type="number" id="tx-amount" placeholder="0" class="w-full mt-1 px-3 py-2.5 rounded-xl border border-slate-200 text-lg font-bold text-right focus:ring-2 focus:ring-indigo-300 outline-none">
                    </div>
                    <div>
                        <label class="text-xs text-slate-400 font-medium">備註</label>
                        <input type="text" id="tx-note" placeholder="例如：薪資、餐費..." class="w-full mt-1 px-3 py-2.5 rounded-xl border border-slate-200 text-sm focus:ring-2 focus:ring-indigo-300 outline-none">
                    </div>
                    <button onclick="addTransaction()" class="w-full py-3 rounded-xl font-bold text-sm text-white bg-indigo-600 hover:bg-indigo-700 transition shadow-md">
                        ✅ 確認新增
                    </button>
                </div>
            </div>

            <!-- 右：近期明細 + 預算 -->
            <div class="lg:col-span-2 space-y-6">

                <!-- 預算進度 -->
                <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
                    <h2 class="font-bold text-sm text-slate-600 mb-3 flex items-center space-x-2">
                        <span class="w-6 h-6 bg-amber-100 text-amber-600 rounded-lg flex items-center justify-center text-xs">🎯</span>
                        <span>本月預算</span>
                        <button onclick="editBudget()" class="ml-auto text-xs text-indigo-500 hover:text-indigo-700 font-medium">✏️ 設定</button>
                    </h2>
                    <div id="budget-container" class="space-y-2">
                        <div class="text-xs text-slate-400 text-center py-4">尚未設定預算，點「設定」開始</div>
                    </div>
                </div>

                <!-- 近期明細 -->
                <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
                    <div class="flex justify-between items-center mb-3">
                        <h2 class="font-bold text-sm text-slate-600 flex items-center space-x-2">
                            <span class="w-6 h-6 bg-sky-100 text-sky-600 rounded-lg flex items-center justify-center text-xs">📋</span>
                            <span>近期明細</span>
                        </h2>
                        <div class="flex space-x-2">
                            <select id="month-filter" class="text-xs px-2 py-1.5 rounded-lg border border-slate-200 bg-white outline-none" onchange="renderTable()"></select>
                            <button onclick="renderTable()" class="text-xs px-3 py-1.5 bg-slate-100 hover:bg-slate-200 rounded-lg font-medium transition">🔄</button>
                        </div>
                    </div>
                    <div id="tx-table" class="text-xs text-slate-400 text-center py-8">尚無紀錄</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 設定預算 Modal -->
    <div id="budget-modal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-3xl max-w-md w-full p-6 shadow-xl">
            <h3 class="font-bold text-slate-700 mb-4">🎯 設定本月預算</h3>
            <div id="budget-form" class="space-y-3"></div>
            <div class="flex space-x-3 mt-6">
                <button onclick="closeBudgetModal()" class="flex-1 py-2.5 rounded-xl text-xs font-bold bg-slate-100 hover:bg-slate-200 transition">取消</button>
                <button onclick="saveBudget()" class="flex-1 py-2.5 rounded-xl text-xs font-bold bg-indigo-600 hover:bg-indigo-700 text-white transition shadow-md">儲存</button>
            </div>
        </div>
    </div>

    <!-- 編輯/刪除單筆 Modal -->
    <div id="edit-modal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-3xl max-w-sm w-full p-6 shadow-xl">
            <h3 class="font-bold text-slate-700 mb-4">✏️ 編輯紀錄</h3>
            <div class="space-y-3">
                <div><label class="text-xs text-slate-400">日期</label><input type="date" id="edit-date" class="w-full mt-1 px-3 py-2 rounded-xl border border-slate-200 text-sm outline-none"></div>
                <div><label class="text-xs text-slate-400">分類</label><select id="edit-category" class="w-full mt-1 px-3 py-2.5 rounded-xl border border-slate-200 text-sm outline-none bg-white"></select></div>
                <div><label class="text-xs text-slate-400">金額</label><input type="number" id="edit-amount" class="w-full mt-1 px-3 py-2.5 rounded-xl border border-slate-200 text-lg font-bold text-right outline-none"></div>
                <div><label class="text-xs text-slate-400">備註</label><input type="text" id="edit-note" class="w-full mt-1 px-3 py-2.5 rounded-xl border border-slate-200 text-sm outline-none"></div>
            </div>
            <div class="flex space-x-3 mt-6">
                <button onclick="deleteTransaction()" class="px-4 py-2.5 rounded-xl text-xs font-bold bg-rose-100 text-rose-600 hover:bg-rose-200 transition">🗑️ 刪除</button>
                <button onclick="closeEditModal()" class="flex-1 py-2.5 rounded-xl text-xs font-bold bg-slate-100 hover:bg-slate-200 transition">取消</button>
                <button onclick="saveEdit()" class="flex-1 py-2.5 rounded-xl text-xs font-bold bg-indigo-600 hover:bg-indigo-700 text-white transition shadow-md">儲存</button>
            </div>
        </div>
    </div>

    <!-- Toast 通知 -->
    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 px-5 py-3 rounded-2xl shadow-lg text-sm font-medium transition-all duration-500 opacity-0 scale-90 pointer-events-none bg-slate-800 text-white">
        <span id="toast-text">訊息</span>
    </div>

    <script>
        // ============================================================
        //  1. 資料結構
        // ============================================================
        const CATEGORIES = {
            income: ['薪資', '獎金', '投資收益', '兼職收入', '紅包/禮金', '其他收入'],
            expense: ['餐飲/外食', '日常採買', '交通', '居住/水電', '娛樂', '醫療', '教育', '通訊', '保險', '其他支出']
        };
        const BUDGET_CATS = ['餐飲/外食', '日常採買', '交通', '居住/水電', '娛樂', '醫療', '教育', '通訊', '保險', '其他支出'];

        let transactions = [];
        let budgets = {};
        let currentType = 'expense';
        let editingId = null;

        // ============================================================
        //  2. Google Drive 設定
        // ============================================================
        const DRIVE_FILE_NAME = 'family-finance-data.json';
        const CLIENT_ID = '679093324058-i33q3l90dp0cffaeekfknqr64b63tjkf.apps.googleusercontent.com';
        const SCOPES = 'https://www.googleapis.com/auth/drive.file';

        let gapiInited = false;
        let tokenClient = null;
        let accessToken = null;

        // ============================================================
        //  3. 初始化
        // ============================================================
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('tx-date').value = today();
            document.getElementById('month-filter').value = currentMonth();
            updateDateBadge();
            loadData();
            renderCategories();
            renderBudgetForm();
            renderAll();
            restoreSyncState();
        });

        function today() { return new Date().toISOString().split('T')[0]; }
        function currentMonth() { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; }

        function updateDateBadge() {
            const now = new Date();
            document.getElementById('date-badge').textContent =
                `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
        }

        // ============================================================
        //  4. localStorage
        // ============================================================
        function loadData() {
            try {
                transactions = JSON.parse(localStorage.getItem('famt_tx') || '[]');
                budgets = JSON.parse(localStorage.getItem('famt_budget') || '{}');
            } catch(e) { transactions = []; budgets = {}; }
        }

        function saveData() {
            localStorage.setItem('famt_tx', JSON.stringify(transactions));
            localStorage.setItem('famt_budget', JSON.stringify(budgets));
        }

        // ============================================================
        //  5. 類別切換
        // ============================================================
        function setType(t) {
            currentType = t;
            ['income','expense'].forEach(ty => {
                const el = document.getElementById('type-'+ty);
                el.className = ty === t
                    ? 'flex-1 py-2 rounded-xl text-xs font-bold transition bg-emerald-100 text-emerald-700 border border-emerald-200'
                    : 'flex-1 py-2 rounded-xl text-xs font-bold transition bg-slate-100 text-slate-500 border border-slate-200';
            });
            renderCategories();
        }

        function renderCategories() {
            document.getElementById('tx-category').innerHTML =
                CATEGORIES[currentType].map(c => `<option value="${c}">${c}</option>`).join('');
        }

        // ============================================================
        //  6. 交易 CRUD
        // ============================================================
        function addTransaction() {
            const date = document.getElementById('tx-date').value;
            const category = document.getElementById('tx-category').value;
            const amount = parseFloat(document.getElementById('tx-amount').value);
            const note = document.getElementById('tx-note').value.trim();
            if (!date || !amount || amount <= 0) { showToast('請填寫日期和有效的金額', '⚠️'); return; }
            transactions.unshift({
                id: Date.now() + '_' + Math.random().toString(36).slice(2,6),
                date, type: currentType,
                amount: currentType === 'expense' ? -amount : amount,
                category,
                note: note || (currentType === 'income' ? '收入' : '支出')
            });
            saveData();
            document.getElementById('tx-amount').value = '';
            document.getElementById('tx-note').value = '';
            renderAll();
            showToast('✅ 已新增一筆紀錄');
        }

        function renderTable() {
            const container = document.getElementById('tx-table');
            const mf = document.getElementById('month-filter').value;
            const filtered = transactions.filter(t => t.date.startsWith(mf));
            if (!filtered.length) { container.innerHTML = '<div class="text-xs text-slate-400 py-8">尚無紀錄</div>'; return; }
            let html = '<div class="space-y-1 max-h-80 overflow-y-auto no-scrollbar">';
            filtered.slice(0, 50).forEach(t => {
                const sign = t.amount >= 0 ? 'text-emerald-600' : 'text-rose-500';
                const icon = t.amount >= 0 ? '📈' : '📉';
                html += `<div onclick="openEdit('${t.id}')" class="flex items-center justify-between px-3 py-2.5 rounded-xl hover:bg-slate-50 cursor-pointer transition border-b border-slate-50 last:border-0">
                    <div class="flex items-center space-x-3 min-w-0">
                        <span>${icon}</span>
                        <div class="min-w-0">
                            <p class="text-xs font-medium text-slate-700 truncate">${escHtml(t.category)}${t.note ? ' · ' + escHtml(t.note) : ''}</p>
                            <p class="text-[10px] text-slate-400">${t.date}</p>
                        </div>
                    </div>
                    <span class="text-sm font-bold ${sign} shrink-0 ml-2">${t.amount > 0 ? '+' : ''}$${Math.abs(t.amount).toLocaleString()}</span>
                </div>`;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        function renderSummary() {
            const mf = document.getElementById('month-filter').value;
            const filtered = transactions.filter(t => t.date.startsWith(mf));
            const income = filtered.filter(t => t.amount > 0).reduce((s, t) => s + t.amount, 0);
            const expense = filtered.filter(t => t.amount < 0).reduce((s, t) => s + Math.abs(t.amount), 0);
            document.getElementById('sum-income').textContent = `$${income.toLocaleString()}`;
            document.getElementById('sum-expense').textContent = `$${expense.toLocaleString()}`;
            document.getElementById('sum-balance').textContent = `$${(income - expense).toLocaleString()}`;
            document.getElementById('sum-count').textContent = filtered.length;
        }

        // ============================================================
        //  7. 預算
        // ============================================================
        function renderBudgetForm() {
            document.getElementById('budget-form').innerHTML =
                BUDGET_CATS.map(c => `
                    <div class="flex items-center space-x-3">
                        <label class="text-xs text-slate-500 w-20 shrink-0">${c}</label>
                        <input type="number" id="bg-${c}" value="${budgets[c] || ''}" placeholder="0" class="flex-1 px-3 py-2 rounded-xl border border-slate-200 text-sm text-right outline-none focus:ring-2 focus:ring-indigo-300">
                    </div>
                `).join('');
        }

        function saveBudget() {
            BUDGET_CATS.forEach(c => {
                const v = parseFloat(document.getElementById(`bg-${c}`).value);
                if (v > 0) budgets[c] = v; else delete budgets[c];
            });
            saveData();
            closeBudgetModal();
            renderBudgetProgress();
            showToast('✅ 預算已儲存');
        }

        function renderBudgetProgress() {
            const container = document.getElementById('budget-container');
            const mf = currentMonth();
            const expense = transactions.filter(t => t.date.startsWith(mf) && t.amount < 0);
            const spent = {};
            expense.forEach(t => { if (!spent[t.category]) spent[t.category] = 0; spent[t.category] += Math.abs(t.amount); });
            const entries = Object.entries(budgets).filter(([c,b]) => b > 0);
            if (!entries.length) { container.innerHTML = '<div class="text-xs text-slate-400 text-center py-4">尚未設定預算，點「設定」開始</div>'; return; }
            container.innerHTML = entries.map(([cat, budget]) => {
                const used = spent[cat] || 0;
                const pct = Math.min(100, Math.round((used / budget) * 100));
                const color = pct >= 100 ? 'bg-rose-500' : pct >= 80 ? 'bg-amber-500' : 'bg-emerald-500';
                return `<div>
                    <div class="flex justify-between text-xs mb-1">
                        <span class="text-slate-600 font-medium">${cat}</span>
                        <span class="text-slate-400">$${used.toLocaleString()} / $${budget.toLocaleString()} (${pct}%)</span>
                    </div>
                    <div class="w-full h-2 bg-slate-100 rounded-full overflow-hidden">
                        <div class="h-full ${color} rounded-full transition-all duration-500" style="width:${pct}%"></div>
                    </div>
                </div>`;
            }).join('');
        }

        function editBudget() { renderBudgetForm(); document.getElementById('budget-modal').classList.remove('hidden'); }
        function closeBudgetModal() { document.getElementById('budget-modal').classList.add('hidden'); }

        // ============================================================
        //  8. 編輯 / 刪除
        // ============================================================
        function openEdit(id) {
            const t = transactions.find(x => x.id === id); if (!t) return;
            editingId = id;
            document.getElementById('edit-date').value = t.date;
            document.getElementById('edit-category').innerHTML = CATEGORIES[t.amount >= 0 ? 'income' : 'expense']
                .map(c => `<option value="${c}" ${c === t.category ? 'selected' : ''}>${c}</option>`).join('');
            document.getElementById('edit-amount').value = Math.abs(t.amount);
            document.getElementById('edit-note').value = t.note || '';
            document.getElementById('edit-modal').classList.remove('hidden');
        }

        function saveEdit() {
            const t = transactions.find(x => x.id === editingId); if (!t) return;
            t.date = document.getElementById('edit-date').value;
            t.category = document.getElementById('edit-category').value;
            const sign = t.amount >= 0 ? 1 : -1;
            t.amount = parseFloat(document.getElementById('edit-amount').value) * sign;
            t.note = document.getElementById('edit-note').value.trim();
            saveData(); closeEditModal(); renderAll(); showToast('✅ 已更新');
        }

        function deleteTransaction() {
            if (!confirm('確定刪除此筆？')) return;
            transactions = transactions.filter(t => t.id !== editingId);
            saveData(); closeEditModal(); renderAll(); showToast('🗑️ 已刪除');
        }

        function closeEditModal() { editingId = null; document.getElementById('edit-modal').classList.add('hidden'); }

        function resetAll() {
            if (!confirm('確定清空所有資料？')) return;
            if (!confirm('再次確認！所有紀錄將永久消失！')) return;
            transactions = []; budgets = {}; saveData(); renderAll(); showToast('🗑️ 已清空');
        }

        // ============================================================
        //  9. CSV 匯出
        // ============================================================
        function exportCSV() {
            const mf = document.getElementById('month-filter').value;
            const filtered = transactions.filter(t => t.date.startsWith(mf));
            if (!filtered.length) { showToast('本月無資料可匯出', '⚠️'); return; }
            const header = '日期,類別,分類,金額,備註\n';
            const rows = filtered.map(t => `${t.date},${t.amount >= 0 ? '收入' : '支出'},${t.category},${t.amount},${t.note || ''}`).join('\n');
            const blob = new Blob(['\uFEFF' + header + rows], { type: 'text/csv;charset=utf-8;' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `收支紀錄_${mf}.csv`; a.click();
        }

        // ============================================================
        //  10. JSON 備份（手動匯出/匯入）
        // ============================================================
        function exportJSON() {
            const data = { transactions, budgets, exportedAt: new Date().toISOString() };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `家庭收支備份_${today()}.json`; a.click();
            closeBackupMenu();
            showToast('✅ 備份檔已下載');
        }

        function importJSON(event) {
            const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (!data.transactions || !data.budgets) throw new Error('格式錯誤');
                    transactions = data.transactions;
                    budgets = data.budgets;
                    saveData(); renderAll(); showToast('✅ 已從備份檔還原');
                } catch(err) { showToast('⚠️ 備份檔格式錯誤', '❌'); }
            };
            reader.readAsText(file);
            event.target.value = '';
            closeBackupMenu();
        }

        function toggleBackupMenu() {
            document.getElementById('backup-dropdown').classList.toggle('hidden');
        }
        function closeBackupMenu() {
            document.getElementById('backup-dropdown').classList.add('hidden');
        }
        document.addEventListener('click', e => {
            if (!e.target.closest('#backup-menu')) closeBackupMenu();
        });

        // ============================================================
        //  11. Google Drive 雲端同步
        // ============================================================
        function toggleGDrive() {
            const statusEl = document.getElementById('sync-status');
            if (statusEl.classList.contains('hidden')) {
                initGDrive();
            } else {
                statusEl.classList.add('hidden');
                document.getElementById('gdrive-icon').textContent = '☁️';
                document.getElementById('gdrive-label').textContent = '登入';
                accessToken = null;
                localStorage.removeItem('famt_gdrive_token');
            }
        }

        function restoreSyncState() {
            const saved = localStorage.getItem('famt_gdrive_token');
            if (saved) {
                accessToken = saved;
                updateGDriveUI(true);
            }
        }

        function initGDrive() {
            if (gapiInited) { showGDriveStatus(); return; }

            // 載入 Google Identity Services
            const script = document.createElement('script');
            script.src = 'https://accounts.google.com/gsi/client';
            script.onload = () => {
                tokenClient = google.accounts.oauth2.initTokenClient({
                    client_id: CLIENT_ID,
                    scope: SCOPES,
                    callback: token => {
                        if (token.access_token) {
                            accessToken = token.access_token;
                            localStorage.setItem('famt_gdrive_token', token.access_token);
                            gapiInited = true;
                            updateGDriveUI(true);
                            showToast('☁️ Google Drive 已連線');
                            showGDriveStatus();
                        } else {
                            showToast('⚠️ Google 登入失敗', '❌');
                        }
                    },
                });
                // 直接要求 token（會彈出視窗）
                tokenClient.requestAccessToken({ prompt: '' });
            };
            document.body.appendChild(script);
        }

        function updateGDriveUI(connected) {
            const icon = document.getElementById('gdrive-icon');
            const label = document.getElementById('gdrive-label');
            const status = document.getElementById('sync-status');
            if (connected) {
                icon.textContent = '🔗';
                label.textContent = '已連線';
                status.classList.remove('hidden');
            } else {
                icon.textContent = '☁️';
                label.textContent = '登入';
                status.classList.add('hidden');
            }
        }

        function showGDriveStatus() {
            document.getElementById('sync-text').textContent = '☁️ 已連線 Google Drive，可上傳/下載資料';
            updateGDriveUI(true);
        }

        // 尋找或建立 Drive 檔案
        async function findOrCreateDriveFile() {
            // 搜尋檔案
            const searchRes = await fetch(
                `https://www.googleapis.com/drive/v3/files?q=name='${DRIVE_FILE_NAME}' and trashed=false&fields=files(id,name,modifiedTime)`,
                { headers: { Authorization: `Bearer ${accessToken}` } }
            );
            const searchData = await searchRes.json();
            if (searchData.files && searchData.files.length > 0) {
                return { id: searchData.files[0].id, modifiedTime: searchData.files[0].modifiedTime };
            }
            // 建立新檔案
            const createRes = await fetch('https://www.googleapis.com/drive/v3/files', {
                method: 'POST',
                headers: {
                    Authorization: `Bearer ${accessToken}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    name: DRIVE_FILE_NAME,
                    mimeType: 'application/json'
                })
            });
            const file = await createRes.json();
            // 寫入初始資料
            await uploadToDrive(file.id, { transactions: [], budgets: {} });
            return { id: file.id, modifiedTime: null };
        }

        async function uploadToDrive(fileId, data) {
            const meta = JSON.stringify({ id: fileId });
            const content = JSON.stringify(data);
            const form = new FormData();
            form.append('metadata', new Blob([meta], { type: 'application/json' }));
            form.append('file', new Blob([content], { type: 'application/json' }));

            const res = await fetch(
                `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=multipart`,
                {
                    method: 'PATCH',
                    headers: { Authorization: `Bearer ${accessToken}` },
                    body: form
                }
            );
            return res.ok;
        }

        async function saveToDrive() {
            if (!accessToken) { showToast('⚠️ 請先登入 Google Drive', '❌'); return; }
            setSyncBusy(true);
            try {
                const file = await findOrCreateDriveFile();
                const data = { transactions, budgets, syncedAt: new Date().toISOString() };
                await uploadToDrive(file.id, data);
                setSyncBusy(false);
                document.getElementById('sync-text').textContent = `☁️ 已同步 (${new Date().toLocaleString('zh-TW')})`;
                showToast('☁️ 已上傳至 Google Drive');
            } catch(e) {
                setSyncBusy(false);
                showToast('⚠️ 上傳失敗：' + e.message, '❌');
            }
        }

        async function loadFromDrive() {
            if (!accessToken) { showToast('⚠️ 請先登入 Google Drive', '❌'); return; }
            setSyncBusy(true);
            try {
                const file = await findOrCreateDriveFile();
                const res = await fetch(
                    `https://www.googleapis.com/drive/v3/files/${file.id}?alt=media`,
                    { headers: { Authorization: `Bearer ${accessToken}` } }
                );
                if (!res.ok) throw new Error('下載失敗');
                const data = await res.json();
                if (data.transactions) {
                    transactions = data.transactions;
                    budgets = data.budgets || {};
                    saveData();
                    renderAll();
                    setSyncBusy(false);
                    document.getElementById('sync-text').textContent = `☁️ 已從雲端還原 (${new Date().toLocaleString('zh-TW')})`;
                    showToast('✅ 已從 Google Drive 還原資料');
                } else {
                    setSyncBusy(false);
                    showToast('⚠️ 雲端檔案無資料', '❌');
                }
            } catch(e) {
                setSyncBusy(false);
                showToast('⚠️ 下載失敗：' + e.message, '❌');
            }
        }

        function setSyncBusy(busy) {
            document.getElementById('btn-sync-up').disabled = busy;
            document.getElementById('btn-sync-down').disabled = busy;
            document.getElementById('btn-sync-up').className = busy
                ? 'px-3 py-1.5 bg-slate-100 text-slate-400 rounded-lg text-xs font-medium cursor-not-allowed'
                : 'px-3 py-1.5 bg-indigo-100 text-indigo-700 hover:bg-indigo-200 rounded-lg text-xs font-medium transition';
            document.getElementById('btn-sync-down').className = busy
                ? 'px-3 py-1.5 bg-slate-100 text-slate-400 rounded-lg text-xs font-medium cursor-not-allowed'
                : 'px-3 py-1.5 bg-slate-100 text-slate-600 hover:bg-slate-200 rounded-lg text-xs font-medium transition';
            if (busy) document.getElementById('sync-text').textContent = '☁️ 同步中...';
        }

        // ============================================================
        //  12. Toast 通知
        // ============================================================
        function showToast(msg, icon) {
            const el = document.getElementById('toast');
            const txt = document.getElementById('toast-text');
            txt.textContent = (icon || '') + ' ' + msg;
            el.classList.remove('opacity-0', 'scale-90');
            el.classList.add('opacity-100', 'scale-100');
            clearTimeout(el._timer);
            el._timer = setTimeout(() => {
                el.classList.add('opacity-0', 'scale-90');
                el.classList.remove('opacity-100', 'scale-100');
            }, 2500);
        }

        // ============================================================
        //  13. 統整渲染
        // ============================================================
        function renderAll() { renderSummary(); renderTable(); renderBudgetProgress(); }

        function escHtml(s) {
            const d = document.createElement('div'); d.textContent = s; return d.innerHTML;
        }
    </script>
</body>
</html>
